<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    DOKS Pod Icon – Light Theme
    Official Kubernetes Pod = hollow hexagon outline (flat-top)
    with a small circle in the centre.
    Colored in DigitalOcean blue (#0080FF).
  -->

  <!-- Hexagon outline (flat-top, stroke only) -->
  <polygon
    points="50,6 91,28 91,72 50,94 9,72 9,28"
    fill="#EBF4FF"
    stroke="#0080FF"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Centre circle -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#0080FF" stroke-width="4"/>

  <!-- Six spokes from centre circle to hexagon edges -->
  <!-- top -->
  <line x1="50" y1="40" x2="50" y2="14"  stroke="#0080FF" stroke-width="3" stroke-linecap="round"/>
  <!-- bottom -->
  <line x1="50" y1="60" x2="50" y2="86"  stroke="#0080FF" stroke-width="3" stroke-linecap="round"/>
  <!-- top-right -->
  <line x1="58.7" y1="45" x2="82.5" y2="31" stroke="#0080FF" stroke-width="3" stroke-linecap="round"/>
  <!-- bottom-left -->
  <line x1="41.3" y1="55" x2="17.5" y2="69" stroke="#0080FF" stroke-width="3" stroke-linecap="round"/>
  <!-- top-left -->
  <line x1="41.3" y1="45" x2="17.5" y2="31" stroke="#0080FF" stroke-width="3" stroke-linecap="round"/>
  <!-- bottom-right -->
  <line x1="58.7" y1="55" x2="82.5" y2="69" stroke="#0080FF" stroke-width="3" stroke-linecap="round"/>
</svg>
